<!doctype html><html><head><base target="_top"><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"><?!= include('StormStyles'); ?></head><body>
<div class="app-shell"><header class="app-header"><div class="brand"><div class="mark">2S</div><div><h1>Storm Availability</h1><span>Private Family Update</span></div></div></header>
<section id="codePanel" class="panel"><div class="panel-head"><div><h2>Enter Your Player Code</h2><small>Your six-digit code was provided by Coach Rodney.</small></div></div><div class="panel-body"><div class="field"><label>Player Code</label><input id="code" inputmode="numeric" maxlength="6" placeholder="000000"></div><div id="codeMessage"></div><button id="lookupBtn" class="button orange" style="margin-top:15px">Find My Player</button></div></section>
<section id="eventPanel" class="panel hidden"><div class="panel-head"><div><h2 id="playerName">Player Availability</h2><small>Choose an event and update the forecast.</small></div><button id="changeCode" class="button">Change Code</button></div><div class="panel-body"><div id="events" class="availability-grid"></div><div id="updateMessage"></div></div></section></div>
<script>
let playerCode='',lookupData=null;const $=s=>document.querySelector(s);const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));function call(name,...args){return new Promise((resolve,reject)=>google.script.run.withSuccessHandler(resolve).withFailureHandler(e=>reject(new Error(e.message||e)))[name](...args))}function notice(el,text,type=''){el.innerHTML=text?`<div class="notice ${type}">${esc(text)}</div>`:''}function fmt(v){if(!v)return '';const d=new Date(v+'T12:00:00');return isNaN(d)?v:d.toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'})}
$('#lookupBtn').onclick=lookup;$('#code').onkeydown=e=>{if(e.key==='Enter')lookup()};async function lookup(){playerCode=$('#code').value.replace(/\D/g,'');notice($('#codeMessage'),'');$('#lookupBtn').disabled=true;try{const r=await call('parentLookup',playerCode);if(!r.ok)throw new Error(r.error);lookupData=r;$('#playerName').textContent=r.player.PlayerName+' — Availability';renderEvents();$('#codePanel').classList.add('hidden');$('#eventPanel').classList.remove('hidden')}catch(e){notice($('#codeMessage'),e.message,'error')}finally{$('#lookupBtn').disabled=false}}
function renderEvents(){const root=$('#events');root.innerHTML=(lookupData.events||[]).map(e=>{const cur=lookupData.current[e.EventID]||{};return `<article class="event-choice" data-event="${esc(e.EventID)}"><span class="status-pill">${esc(e.Status||e.Type||'Storm Watch')}</span><h3>${esc(e.Title)}</h3><p>${esc(fmt(e.Date))} · ${esc(e.Time||'TBD')}<br>${esc([e.Location,e.Field].filter(Boolean).join(' · '))}</p><div class="status-buttons">${button('READY FOR THE STORM','good',cur.Status)}${button('NOT AVAILABLE','bad',cur.Status)}${button('FORECAST UNCERTAIN','maybe',cur.Status)}</div><div class="field"><label>Notes for Coach</label><textarea data-notes placeholder="Optional note">${esc(cur.Notes||'')}</textarea></div><button class="button primary" data-save>Update This Event</button></article>`}).join('')||'<div class="notice">No upcoming events are posted yet.</div>';document.querySelectorAll('.status-button').forEach(b=>b.onclick=()=>{const card=b.closest('.event-choice');card.querySelectorAll('.status-button').forEach(x=>x.classList.remove('selected'));b.classList.add('selected')});document.querySelectorAll('[data-save]').forEach(b=>b.onclick=()=>save(b.closest('.event-choice')))}
function button(status,cls,current){return `<button class="status-button ${cls} ${status===current?'selected':''}" data-status="${status}">${status}</button>`}
async function save(card){const selected=card.querySelector('.status-button.selected');if(!selected){notice($('#updateMessage'),'Choose an availability status first.','error');return}const btn=card.querySelector('[data-save]');btn.disabled=true;notice($('#updateMessage'),'');try{const r=await call('parentUpdateAvailability',playerCode,card.dataset.event,selected.dataset.status,card.querySelector('[data-notes]').value);if(!r.ok)throw new Error(r.error);notice($('#updateMessage'),r.message,'success');lookupData=await call('parentLookup',playerCode);renderEvents()}catch(e){notice($('#updateMessage'),e.message,'error')}finally{btn.disabled=false}}
$('#changeCode').onclick=()=>{$('#eventPanel').classList.add('hidden');$('#codePanel').classList.remove('hidden');$('#code').value='';$('#code').focus()};
</script></body></html>
